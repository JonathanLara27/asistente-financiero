@if (isOpen()) {
<div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[80] transition-opacity duration-300"
    (click)="onCancel.emit()">
</div>

<div class="fixed inset-0 m-auto w-[85%] max-w-sm h-fit bg-[#121212] rounded-[32px] border border-white/10 p-8 z-[90] flex flex-col items-center text-center gap-6 shadow-2xl"
    animate.enter="modal-enter" animate.leave="modal-leave">

    <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center">
        <svg class="w-8 h-8 text-red-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18" />
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
            <line x1="10" x2="10" y1="11" y2="17" />
            <line x1="14" x2="14" y1="11" y2="17" />
        </svg>
    </div>

    <div class="space-y-2">
        <h3 class="text-xl font-bold text-white">{{ title() }}</h3>
        <p class="text-sm text-gray-400">{{ subtitle() }}</p>
    </div>

    <div class="flex w-full gap-4">
        <button (click)="onCancel.emit()"
            class="flex-1 py-4 rounded-2xl bg-[#1a1a1a] font-bold text-sm text-white border border-white/5 hover:bg-[#252525] active:scale-95 transition-all">
            Cancelar
        </button>
        <button (click)="onConfirm.emit()"
            class="flex-1 py-4 rounded-2xl bg-red-500 font-bold text-sm text-white hover:bg-red-600 active:scale-95 transition-all shadow-[0_0_15px_rgba(239,68,68,0.2)]">
            Eliminar
        </button>
    </div>

</div>
}
