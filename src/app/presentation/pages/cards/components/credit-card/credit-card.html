<div [ngClass]="card().color"
    class="min-w-[300px] w-[300px] p-6 rounded-[32px] border border-white/10 aspect-[1.6/1] relative overflow-hidden shadow-2xl bg-gradient-to-br transition-all duration-500"
    [class.grayscale]="!card().isActive" [class.opacity-80]="!card().isActive">

    <div class="relative z-10 h-full flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="w-12 h-8 bg-gradient-to-r from-yellow-400 to-yellow-600 rounded-md opacity-80 shadow-inner">
            </div>
            <span class="text-lg font-bold italic text-white/40 uppercase tracking-tighter">{{ card().type }}</span>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <p class="text-xl font-mono tracking-[0.2em] text-white" [class.line-through]="!card().isActive">
                    {{ showNumbers() ? '4532 8812 9901 ' + card().lastFour : '•••• •••• •••• ' + card().lastFour }}
                </p>
                <button (click)="toggleNumbers($event)" class="text-white/30 hover:text-white transition-colors">
                    @if (showNumbers()) {
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .698 10.747 10.747 0 0 1-12.276 6.584M12 12a3 3 0 1 1-3-3" />
                        <path d="m2 2 20 20" />
                        <path
                            d="M6.712 6.712A10.73 10.73 0 0 0 2.062 11.65a1 1 0 0 0 0 .7 10.743 10.743 0 0 0 15.225 3.938" />
                    </svg>
                    } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    }
                </button>
            </div>

            <div class="flex justify-between items-end">
                <div>
                    <p class="text-[8px] uppercase text-white/40 tracking-widest">Titular</p>
                    <p class="text-sm font-medium text-white">{{ card().holder }}</p>
                </div>
                <div class="text-right">
                    @if (card().isActive) {
                    <p class="text-[8px] uppercase text-white/40 tracking-widest">Límite</p>
                    <p class="text-sm font-bold text-[#a3ff33]">
                        {{ card().limit | currency:'PEN':'S/ ' }}
                    </p>
                    } @else {
                    <div class="bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 mt-1">
                        <p class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Archivada</p>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>

    <div class="absolute top-0 right-0 w-32 h-32 bg-[#a3ff33]/10 blur-3xl rounded-full"></div>
</div>
